name: Repository contracts

on:
  pull_request:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'ops/**'
      - 'integration/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-contracts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate repository and snapshot contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Compile snapshot tool
        run: python3 -m py_compile ops/snapshot/build_light_snapshot.py

      - name: Run snapshot privacy tests
        run: python3 -m unittest discover -s tests/snapshot -p 'test_*.py' -v

      - name: Reject protected runtime artifacts tracked by Git
        shell: bash
        run: |
          set -euo pipefail
          forbidden_regex='(^|/)(\.env($|\.)|ASPA_Legacy_.*\.(csv|xlsx|zip)$|WORK AI online.*\.xlsx$|google-credentials\.json$|.*service-account.*\.json$|.*\.(pem|p12|pfx|dump|backup|sqlite3?)$)'
          matches="$(git ls-files \
            | grep -Ei "$forbidden_regex" \
            | grep -Ev '(^|/)\.env\.example$' \
            || true)"
          if [[ -n "$matches" ]]; then
            echo "Forbidden tracked artifacts detected:"
            echo "$matches"
            exit 1
          fi

      - name: Verify legacy manifest contains metadata only
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path('docs/data/legacy/ASPA_LEGACY_IMPORT_MANIFEST_V1.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          forbidden = {'rows_data', 'customers', 'vehicles', 'orders', 'phones', 'emails', 'vins'}

          def walk(value, location='manifest'):
              if isinstance(value, dict):
                  for key, child in value.items():
                      if key.lower() in forbidden:
                          raise SystemExit(f'Forbidden manifest key: {location}.{key}')
                      walk(child, f'{location}.{key}')
              elif isinstance(value, list):
                  for index, child in enumerate(value):
                      walk(child, f'{location}[{index}]')

          walk(data)
          print('Legacy manifest metadata-only check: PASS')
          PY
